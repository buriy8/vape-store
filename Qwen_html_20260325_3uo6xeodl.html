<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | KAMPODIK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-page { padding-top: 120px; min-height: 100vh; }
        .profile-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .profile-grid { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
        .profile-sidebar { background: var(--bg-card); border-radius: 20px; padding: 30px; border: 2px solid var(--accent-purple); }
        .profile-avatar { width: 120px; height: 120px; background: var(--gradient-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 20px; }
        .profile-name { font-family: 'Orbitron'; font-size: 1.5rem; text-align: center; margin-bottom: 5px; }
        .profile-email { color: var(--text-secondary); text-align: center; margin-bottom: 30px; }
        .profile-menu a { display: flex; align-items: center; gap: 10px; padding: 15px; color: var(--text-secondary); border-radius: 10px; margin-bottom: 10px; transition: all 0.3s ease; }
        .profile-menu a:hover, .profile-menu a.active { background: var(--accent-purple); color: white; }
        .profile-content { background: var(--bg-card); border-radius: 20px; padding: 40px; border: 2px solid var(--accent-purple); }
        .section-title { font-family: 'Orbitron'; font-size: 2rem; margin-bottom: 30px; color: var(--accent-blue); }
        .profile-form .form-group { margin-bottom: 20px; }
        .profile-form label { display: block; margin-bottom: 10px; font-weight: 600; }
        .profile-form input { width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid rgba(157, 78, 221, 0.3); border-radius: 10px; color: var(--text-primary); font-size: 1rem; }
        .profile-form input:focus { outline: none; border-color: var(--accent-purple); }
        .btn-save { padding: 15px 40px; background: var(--gradient-main); border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .orders-list { margin-top: 30px; }
        .order-card { background: var(--bg-secondary); border-radius: 15px; padding: 25px; margin-bottom: 20px; border-left: 4px solid var(--accent-purple); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .order-id { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--accent-blue); }
        .order-status { padding: 8px 20px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; }
        .status-new { background: #00d9ff; color: #000; }
        .status-processing { background: #9d4edd; color: #fff; }
        .status-shipped { background: #ff006e; color: #fff; }
        .status-delivered { background: #00ff88; color: #000; }
        .status-cancelled { background: #666; color: #fff; }
        .order-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .order-item { padding: 10px; background: var(--bg-card); border-radius: 10px; }
        .order-total { text-align: right; font-size: 1.3rem; font-weight: 700; color: var(--accent-green); }
        .btn-view { padding: 10px 20px; background: var(--accent-purple); border: none; border-radius: 10px; color: white; cursor: pointer; }
        .no-orders { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .no-orders i { font-size: 5rem; margin-bottom: 20px; opacity: 0.5; }
        @media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-smoking"></i>
                <span>KAMPODIK</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="profile.html" class="active">Профиль</a></li>
            </ul>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </a>
                <div class="user-menu" id="userMenu"></div>
            </div>
        </div>
    </nav>

    <!-- СТРАНИЦА ПРОФИЛЯ -->
    <section class="profile-page">
        <div class="profile-container">
            <div class="profile-grid">
                <!-- БОКОВАЯ ПАНЕЛЬ -->
                <aside class="profile-sidebar">
                    <div class="profile-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <h2 class="profile-name" id="profileName">Загрузка...</h2>
                    <p class="profile-email" id="profileEmail">...</p>
                    <nav class="profile-menu">
                        <a href="#" class="active" onclick="showSection('orders')"><i class="fas fa-box"></i> Мои заказы</a>
                        <a href="#" onclick="showSection('settings')"><i class="fas fa-cog"></i> Настройки</a>
                        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                    </nav>
                </aside>

                <!-- ОСНОВНОЙ КОНТЕНТ -->
                <main class="profile-content">
                    <!-- ЗАКАЗЫ -->
                    <div id="ordersSection">
                        <h2 class="section-title"><i class="fas fa-box"></i> Мои заказы</h2>
                        <div class="orders-list" id="ordersList">
                            <!-- Заказы загружаются через JS -->
                        </div>
                    </div>

                    <!-- НАСТРОЙКИ -->
                    <div id="settingsSection" style="display: none;">
                        <h2 class="section-title"><i class="fas fa-cog"></i> Настройки профиля</h2>
                        <form class="profile-form" onsubmit="updateProfile(event)">
                            <div class="form-group">
                                <label>Имя</label>
                                <input type="text" id="editName" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="editEmail" required>
                            </div>
                            <div class="form-group">
                                <label>Телефон</label>
                                <input type="tel" id="editPhone" required>
                            </div>
                            <div class="form-group">
                                <label>Новый пароль (оставьте пустым, чтобы не менять)</label>
                                <input type="password" id="editPassword" placeholder="••••••••" minlength="6">
                            </div>
                            <button type="submit" class="btn-save">
                                <i class="fas fa-save"></i> Сохранить изменения
                            </button>
                        </form>
                    </div>
                </main>
            </div>
        </div>
    </section>

    <!-- УВЕДОМЛЕНИЯ -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/auth.js"></script>
    <script>
        // ========== ПРОВЕРКА АВТОРИЗАЦИИ ==========
        window.addEventListener('DOMContentLoaded', () => {
            const auth = checkAuth();
            if (!auth.isLoggedIn) {
                window.location.href = 'login.html';
                return;
            }
            loadProfile();
            loadOrders();
            updateCartCount();
        });

        // ========== ЗАГРУЗКА ПРОФИЛЯ ==========
        function loadProfile() {
            const user = getCurrentUser();
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileEmail').textContent = user.email;
            
            document.getElementById('editName').value = user.name;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editPhone').value = user.phone;
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ СЕКЦИЙ ==========
        function showSection(section) {
            document.querySelectorAll('.profile-menu a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('ordersSection').style.display = section === 'orders' ? 'block' : 'none';
            document.getElementById('settingsSection').style.display = section === 'settings' ? 'block' : 'none';
        }

        // ========== ЗАГРУЗКА ЗАКАЗОВ ==========
        function loadOrders() {
            const user = getCurrentUser();
            const ordersContainer = document.getElementById('ordersList');
            
            // Получаем все заказы из localStorage
            const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
            
            // Фильтруем заказы текущего пользователя
            const userOrders = allOrders.filter(o => o.userEmail === user.email);
            
            if (userOrders.length === 0) {
                ordersContainer.innerHTML = `
                    <div class="no-orders">
                        <i class="fas fa-shopping-bag"></i>
                        <h3>У вас пока нет заказов</h3>
                        <p>Перейдите в каталог и сделайте первый заказ!</p>
                        <a href="catalog.html" class="btn btn-primary" style="margin-top: 20px;">В каталог</a>
                    </div>
                `;
                return;
            }
            
            // Сортируем по дате (новые сначала)
            userOrders.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            ordersContainer.innerHTML = userOrders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-id">Заказ #${order.id}</span>
                        <span class="order-status status-${order.status}">${getStatusText(order.status)}</span>
                    </div>
                    <div class="order-details">
                        <div class="order-item">
                            <strong>📅 Дата:</strong><br>
                            ${formatDate(order.date)}
                        </div>
                        <div class="order-item">
                            <strong>📦 Товаров:</strong><br>
                            ${order.items.length}
                        </div>
                        <div class="order-item">
                            <strong> Доставка:</strong><br>
                            ${order.delivery || 'Самовывоз'}
                        </div>
                        <div class="order-item">
                            <strong>📍 Адрес:</strong><br>
                            ${order.address || 'Не указан'}
                        </div>
                    </div>
                    <div class="order-total">
                        Итого: ${order.total.toLocaleString()} ₽
                    </div>
                    <button class="btn-view" onclick="viewOrderDetails(${order.id})" style="margin-top: 15px;">
                        <i class="fas fa-eye"></i> Подробнее
                    </button>
                </div>
            `).join('');
        }

        // ========== СТАТУСЫ ЗАКАЗОВ ==========
        function getStatusText(status) {
            const statuses = {
                'new': '🆕 Новый',
                'processing': '⏳ В обработке',
                'shipped': '📦 Отправлен',
                'delivered': '✅ Доставлен',
                'cancelled': '❌ Отменён'
            };
            return statuses[status] || status;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // ========== ПРОСМОТР ЗАКАЗА ==========
        function viewOrderDetails(orderId) {
            const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
            const order = allOrders.find(o => o.id === orderId);
            
            if (!order) return;
            
            const itemsList = order.items.map(item => 
                `${item.name} × ${item.quantity} — ${item.price * item.quantity} ₽`
            ).join('<br>');
            
            alert(`📦 Заказ #${order.id}\n\n🛍️ Товары:\n${itemsList}\n\n💰 Итого: ${order.total.toLocaleString()} ₽\n\n📍 Адрес: ${order.address}\n📞 Телефон: ${order.phone}\n\n📊 Статус: ${getStatusText(order.status)}`);
        }

        // ========== ОБНОВЛЕНИЕ ПРОФИЛЯ ==========
        function updateProfile(event) {
            event.preventDefault();
            
            const newName = document.getElementById('editName').value;
            const newEmail = document.getElementById('editEmail').value;
            const newPhone = document.getElementById('editPhone').value;
            const newPassword = document.getElementById('editPassword').value;
            
            const user = getCurrentUser();
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(u => u.email === user.email);
            
            if (userIndex === -1) {
                showToast('Пользователь не найден', 'error');
                return;
            }
            
            // Проверка на уникальный email
            if (newEmail !== user.email) {
                const emailExists = users.find(u => u.email === newEmail);
                if (emailExists) {
                    showToast('Такой email уже занят', 'error');
                    return;
                }
            }
            
            // Обновляем данные
            users[userIndex].name = newName;
            users[userIndex].email = newEmail;
            users[userIndex].phone = newPhone;
            if (newPassword) {
                users[userIndex].password = newPassword;
            }
            
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(users[userIndex]));
            
            showToast('Профиль обновлён!', 'success');
            loadProfile();
            updateUserMenu();
        }

        // ========== ВЫХОД ==========
        function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }

        // ========== УВЕДОМЛЕНИЯ ==========
        function showToast(message, type = 'success') {
            let container = document.getElementById('toastContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toastContainer';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
