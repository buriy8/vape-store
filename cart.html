<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина | KAMPODIK </title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-page { padding-top: 150px; min-height: 100vh; }
        .cart-container { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
        .cart-items { background: var(--bg-card); padding: 30px; border-radius: 20px; }
        .cart-item { display: flex; gap: 20px; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .cart-item img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; }
        .cart-item-info { flex: 1; }
        .cart-item-quantity { display: flex; align-items: center; gap: 10px; }
        .cart-item-quantity button { width: 35px; height: 35px; border: none; background: var(--accent-purple); color: white; border-radius: 5px; cursor: pointer; }
        .cart-item-remove { background: none; border: none; color: var(--accent-pink); cursor: pointer; font-size: 1.2rem; }
        .cart-summary { background: var(--bg-card); padding: 30px; border-radius: 20px; height: fit-content; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .summary-total { font-size: 1.5rem; font-weight: 700; color: var(--accent-green); border-top: 2px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .cart-empty { text-align: center; padding: 60px 20px; }
        .cart-empty i { font-size: 5rem; color: var(--text-secondary); margin-bottom: 20px; }
        @media (max-width: 768px) { .cart-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- Навигация (та же) -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-smoking"></i>
                <span>KAMPOD</span>
                <span class="logo-accent">STORE</span>
            </a>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </a>
            </div>
        </div>
    </nav>

    <section class="cart-page section">
        <div class="container">
            <h1 class="section-title">Корзина</h1>
            <div class="cart-container">
                <div class="cart-items" id="cartItems">
                    <!-- Товары загружаются через JS -->
                </div>
                <div class="cart-summary">
                    <h2>Итого</h2>
                    <div class="summary-row">
                        <span>Товары:</span>
                        <span id="subtotal">0 ₽</span>
                    </div>
                    <div class="summary-row">
                        <span>Доставка:</span>
                        <span id="shipping">0 ₽</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Всего:</span>
                        <span id="cartTotal">0 ₽</span>
                    </div>
                    <a href="checkout.html" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
                        Оформить заказ
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // Обновление итогов
        function updateCartSummary() {
            const total = getCartTotal();
            const shipping = total > 5000 ? 0 : 300;
            document.getElementById('subtotal').textContent = `${total} ₽`;
            document.getElementById('shipping').textContent = shipping === 0 ? 'Бесплатно' : `${shipping} ₽`;
            document.getElementById('cartTotal').textContent = `${total + shipping} ₽`;
        }
        updateCartSummary();
    </script>
</body>
</html>
