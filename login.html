<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и Регистрация | KAMPODIK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-card: #252525;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-purple: #9d4edd;
            --accent-blue: #00d9ff;
            --accent-pink: #ff006e;
            --accent-green: #00ff88;
            --gradient-main: linear-gradient(135deg, #9d4edd 0%, #ff006e 100%);
            --glow-purple: 0 0 20px rgba(157, 78, 221, 0.5);
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
        }
        .auth-card {
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 50px 40px;
            border: 2px solid var(--accent-purple);
            box-shadow: var(--glow-purple);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .auth-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
        }
        .auth-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .auth-tab {
            flex: 1;
            padding: 15px;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 15px;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
        }
        .auth-tab.active {
            background: var(--gradient-main);
            color: white;
            border-color: var(--accent-purple);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: var(--bg-card);
            border: 2px solid rgba(157, 78, 221, 0.3);
            border-radius: 15px;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: var(--glow-purple);
        }
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: var(--gradient-main);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: var(--glow-purple);
        }
        .auth-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }
        .auth-footer a:hover {
            color: var(--accent-purple);
        }
        .back-to-site {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            color: var(--text-secondary);
            text-decoration: none;
        }
        .back-to-site:hover {
            color: var(--accent-purple);
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
        }
        .toast {
            background: var(--bg-card);
            padding: 20px 30px;
            border-radius: 15px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid var(--accent-green);
            animation: slideIn 0.3s ease;
        }
        .toast.error {
            border-left-color: var(--accent-pink);
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 480px) {
            .auth-card { padding: 40px 25px; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>KAMPODIK</h1>
                <p>Вход или регистрация</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Вход</button>
                <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
            </div>

            <!-- ФОРМА ВХОДА -->
            <div class="form-section active" id="loginForm">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </form>
            </div>

            <!-- ФОРМА РЕГИСТРАЦИИ -->
            <div class="form-section" id="registerForm">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Имя</label>
                        <input type="text" id="registerName" placeholder="Иван Иванов" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="registerEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Телефон</label>
                        <input type="tel" id="registerPhone" placeholder="+7 (999) 123-45-67" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <input type="password" id="registerPassword" placeholder="••••••••" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Повторите пароль</label>
                        <input type="password" id="registerPasswordConfirm" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-user-plus"></i> Зарегистрироваться
                    </button>
                </form>
            </div>

            <div class="auth-footer">
                <a href="index.html" class="back-to-site">
                    <i class="fas fa-arrow-left"></i> Вернуться на сайт
                </a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        // ========== РЕГИСТРАЦИЯ ==========
        function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const phone = document.getElementById('registerPhone').value;
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;

            // Проверка паролей
            if (password !== passwordConfirm) {
                showToast('Пароли не совпадают!', 'error');
                return;
            }

            // Проверка длины пароля
            if (password.length < 6) {
                showToast('Пароль должен быть не менее 6 символов!', 'error');
                return;
            }

            // Получаем существующих пользователей
            const users = JSON.parse(localStorage.getItem('users')) || [];

            // Проверка на существующий email
            if (users.find(u => u.email === email)) {
                showToast('Такой email уже зарегистрирован!', 'error');
                return;
            }

            // Создаём нового пользователя
            const newUser = {
                id: Date.now(),
                name,
                email,
                phone,
                password, // В реальном проекте хешировать!
                registered: new Date().toISOString(),
                orders: []
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));

            showToast('Регистрация успешна! Теперь войдите.', 'success');
            
            // Переключаем на вкладку входа
            setTimeout(() => {
                switchTab('login');
                document.getElementById('loginEmail').value = email;
            }, 1500);
        }

        // ========== ВХОД ==========
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // Получаем пользователей
            const users = JSON.parse(localStorage.getItem('users')) || [];

            // Ищем пользователя
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                // Успешный вход
                localStorage.setItem('currentUser', JSON.stringify(user));
                localStorage.setItem('isLoggedIn', 'true');
                
                showToast('Успешный вход! Перенаправление...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showToast('Неверный email или пароль!', 'error');
            }
        }

        // ========== УВЕДОМЛЕНИЯ ==========
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // ========== ПРОВЕРКА АВТОРИЗАЦИИ ==========
        window.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
